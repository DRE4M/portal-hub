server {
    listen 80;
    server_name localhost;

    # 1. 포털 메인 대문 (portal-hub)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Pokemantle Nuxt 정적 리소스 (_nuxt) 프록시
    location /_nuxt/ {
        proxy_pass http://host.docker.internal:3000/_nuxt/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. yeardayhour.duckdns.org/pokemantle 접속 시 3000번 포트 Pokemantle로 연결
    location /pokemantle {
        return 301 /pokemantle/;
    }

    location /pokemantle/ {
        proxy_pass http://host.docker.internal:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. yeardayhour.duckdns.org/fastapi 접속 시 8002번 포트 FastAPI로 연결
    location /fastapi {
        return 301 /fastapi/;
    }

    location /fastapi/ {
        proxy_pass http://host.docker.internal:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
